services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data/chroma:/app/backend/data/chroma
      - ./backend/data/processed:/app/backend/data/processed
      - ./backend/data/reports:/app/backend/data/reports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
