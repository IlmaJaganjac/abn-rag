services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      args:
        PREDOWNLOAD_RERANKER: "true"
        RERANKER_MODEL: BAAI/bge-reranker-v2-m3
        HF_TOKEN: ${HF_TOKEN}
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data/chroma:/app/backend/data/chroma
      - ./backend/data/processed:/app/backend/data/processed
      - ./backend/data/reports:/app/backend/data/reports

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
