    company: ABN AMRO Bank
    year: 2025
    eval_type: ragas_context
    user_input: "What net interest income did ABN AMRO report for 2025?"
    reference: "ABN AMRO reported net interest income of EUR 6,335 million in 2025."

  - id: abn_amro_2025_financial_fee_commission_income
    company: ABN AMRO Bank
    year: 2025
    eval_type: ragas_context
    user_input: "What net fee and commission income did ABN AMRO report in 2025?"
    reference: "ABN AMRO reported net fee and commission income of EUR 2,132 million in 2025."

  - id: abn_amro_2025_business_mortgage_production
    company: ABN AMRO Bank
    year: 2025
    eval_type: ragas_context
    user_input: "What market share of new mortgage production did ABN AMRO report in 2025?"
    reference: "ABN AMRO reported a 19% market share of new mortgage production in 2025."

  - id: abn_amro_2025_business_assets_held_for_sale_reclassification
    company: ABN AMRO Bank
    year: 2025
    eval_type: ragas_context
    user_input: "What amount did ABN AMRO reclassify to assets held for sale in 2025?"
    reference: "ABN AMRO referred to a EUR 1.2 billion reclassification to assets held for sale in 2025."

  - id: abn_amro_2025_business_clearing_fee_income
    company: ABN AMRO Bank
    year: 2025
    eval_type: ragas_context
    user_input: "Why did ABN AMRO's Clearing business record higher fee income in 2025?"
    reference: "ABN AMRO's Clearing business recorded higher fee income in 2025 due to increased transaction volumes and elevated market volatility."

  - id: abn_amro_2025_business_operating_activities_income
    company: ABN AMRO Bank
    year: 2025
    eval_type: ragas_context
    user_input: "What net income from other operating activities did ABN AMRO report in 2025?"
    reference: "ABN AMRO reported EUR 30 million of net income from other operating activities in 2025."

  - id: abn_amro_2025_business_priorities
    company: ABN AMRO Bank
    year: 2025
    eval_type: ragas_context
    user_input: "What were ABN AMRO's strategic priorities for 2026 to 2028 as presented in the 2025 report?"
    reference: "ABN AMRO's strategic priorities for 2026 to 2028 were profitable growth, right-sizing the bank's cost base, and deploying capital where it generates the highest returns."

  - id: abn_amro_2025_shareholder_additional_distribution
    company: ABN AMRO Bank
    year: 2025
    eval_type: ragas_context
    user_input: "What additional capital distribution did ABN AMRO announce for 2025?"
    reference: "ABN AMRO announced an additional capital distribution of EUR 500 million for 2025."

  - id: abn_amro_2025_shareholder_final_dividend
    company: ABN AMRO Bank
    year: 2025
    eval_type: ragas_context
    user_input: "What final dividend per share did ABN AMRO propose for 2025?"
    reference: "ABN AMRO proposed a final dividend of EUR 0.70 per share for 2025."

  - id: abn_amro_2025_shareholder_capital_metric
    company: ABN AMRO Bank
    year: 2025
    eval_type: ragas_context
    user_input: "Which capital metric supported ABN AMRO's additional capital distribution in 2025?"
    reference: "ABN AMRO's additional capital distribution was supported by its CET1 ratio of 15.4%."

  - id: abn_amro_2025_general_purpose_strategy
    company: ABN AMRO Bank
    year: 2025
    eval_type: ragas_context
    eval_subtype: narrative
    user_input: "What was ABN AMRO's stated purpose or strategic positioning in the 2025 report?"
    reference: "ABN AMRO described its purpose or positioning as Banking for better, for generations to come, and as being there for everyone with a drive to move forward."

  - id: abn_amro_2025_general_ceo_execution_phrase
    company: ABN AMRO Bank
    year: 2025
    eval_type: ragas_context
    user_input: "What phrase did ABN AMRO's CEO use to describe the importance of execution?"
    reference: "ABN AMRO's CEO used the phrase: Strategy is the first 20%. Execution is the rest."

  - id: abn_amro_2025_general_risk_governance
    company: ABN AMRO Bank
    year: 2025
    eval_type: ragas_context
    eval_subtype: narrative
    user_input: "How did ABN AMRO's Supervisory Board monitor key risks in 2025?"
    reference: "ABN AMRO's Supervisory Board monitored key financial and non-financial risks through internal risk management reporting and CRO memoranda."

  - id: abn_amro_2025_general_business_model_clients
    company: ABN AMRO Bank
    year: 2025
    eval_type: ragas_context
    eval_subtype: narrative
