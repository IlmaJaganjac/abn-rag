  - id: asml_2025_fte_total_employees
    company: ASML
    year: 2025
    category: fte
    question: "How many total employees did ASML report in 2025?"
    expected_source: "asml.pdf"
    expected_page:
      - 227
    expected_answer_contains_any:
      - "44,175"
      - "44175"
      - "total number of employees"
      - "headcount"
    difficulty: easy
    notes: "Total employees/headcount, not payroll plus temporary FTE."

  - id: asml_2025_fte_payroll_employees_fte
