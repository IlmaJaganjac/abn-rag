# Annual Report RAG eval set — ASML 2024 (at-a-glance highlights)
#
# KPI questions sourced from the p.5 highlight grid. These require
# exact highlight-grid retrieval and are tracked separately from the
# main MVP eval because they test a distinct retrieval path.

source: asml-2024.pdf
company: ASML
year: 2024

questions:
  - id: asml_2024_returned_to_shareholders
    question: "How much did ASML return to shareholders in 2024?"
    expected_answer_contains_any:
      - "3.0"
      - "€3.0bn"
      - "€3.0 billion"
    expected_page: 5
    expected_source: "asml-2024.pdf"
    category: verbatim_financial
    difficulty: easy
    notes: "€3.0bn — at-a-glance KPI grid p.5. Much lower than 2025's €8.5bn."

  - id: asml_2024_suppliers_count
    question: "How many total suppliers does ASML have?"
    expected_answer_contains_any:
      - "5,150"
      - "5150"
    expected_page: 5
    expected_source: "asml-2024.pdf"
    category: operational_datapoint
    difficulty: easy
    notes: "5,150 total suppliers — at-a-glance KPI grid p.5."
