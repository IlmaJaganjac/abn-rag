# Annual Report RAG eval set — ASML 2024 (MVP subset)
#
# 19 questions: all from questions-2.yaml except at-a-glance KPIs that require
# highlight-grid retrieval (returned_to_shareholders, suppliers_count).
# Per-question fixes applied vs questions-2.yaml:
#   asml_2024_net_zero_year  → expected_page 200→194
#   asml_2024_rd_spend       → added precise substrings; expected_page 6→56
#   asml_2024_scope12_emissions → question clarified; expected_page 194→200
#   asml_2024_scope3_emissions  → question clarified

source: asml-2024.pdf
company: ASML
year: 2024

questions:
  # ---------- Pre-extracted facts ----------
  - id: asml_2024_fte_rounded
    question: "How many total employees (FTEs) did ASML have in 2024?"
    expected_answer_contains_any:
      - "44,027"
      - "44000"
      - "more than 44,000"
    expected_page: 5
    expected_source: "asml-2024.pdf"
    category: pre_extracted_fact
    difficulty: easy
    notes: "From 'At a glance' summary: '44,027 Total employees (FTEs)'."

  - id: asml_2024_ceo
    question: "Who is the CEO of ASML in 2024?"
    expected_answer_contains_all:
      - "Christophe"
      - "Fouquet"
    expected_page: 7
    expected_source: "asml-2024.pdf"
    category: pre_extracted_fact
    difficulty: easy
    notes: "Christophe Fouquet was appointed at the 2024 AGM."

  - id: asml_2024_net_zero_year
    question: "By what year does ASML aim to be greenhouse gas neutral across its full value chain?"
    expected_answer_contains_any:
      - "2040"
    expected_page: 194
    expected_source: "asml-2024.pdf"
    category: sustainability_target
    difficulty: easy
    notes: "2040 full value chain GHG neutrality target. Page fixed 200→194."

  # ---------- Verbatim financial figures ----------
  - id: asml_2024_total_net_sales
    question: "What were ASML's total net sales in 2024?"
    expected_answer_contains_any:
      - "28.3"
      - "28,262"
      - "€28.3 billion"
    expected_page: 56
    expected_source: "asml-2024.pdf"
    category: verbatim_financial
    difficulty: easy
    notes: "€28.3bn (€28,262.9 million)."

  - id: asml_2024_rd_spend
    question: "How much did ASML spend on R&D in 2024?"
    expected_answer_contains_any:
      - "4.3"
      - "4,303"
      - "4,303.7"
      - "€4.3bn"
      - "€4.3 billion"
    expected_page: 56
    expected_source: "asml-2024.pdf"
    category: verbatim_financial
    difficulty: easy
    notes: "€4,303.7m (€4.3bn). Page fixed 6→56 (R&D appears in financial tables)."

  - id: asml_2024_gross_margin
    question: "What was ASML's gross margin in 2024?"
    expected_answer_contains_any:
      - "51.3"
      - "51.3%"
    expected_page: 56
    expected_source: "asml-2024.pdf"
    category: verbatim_financial
    difficulty: easy
    notes: "51.3%."

  - id: asml_2024_net_income
    question: "What was ASML's net income in 2024?"
    expected_answer_contains_any:
      - "7.6"
      - "7,571"
      - "€7.6 billion"
    expected_page: 58
    expected_source: "asml-2024.pdf"
    category: verbatim_financial
    difficulty: medium
    notes: "€7.6bn (€7,571.6 million)."

  # ---------- Operational datapoints ----------
  - id: asml_2024_system_sales_units
    question: "How many lithography systems did ASML sell in 2024?"
    expected_answer_contains_any:
      - "418"
    expected_page: 55
    expected_source: "asml-2024.pdf"
    category: operational_datapoint
    difficulty: medium
    notes: "418 units (vs 449 in 2023)."

  - id: asml_2024_customer_satisfaction
    question: "What was ASML's customer satisfaction survey score in 2024?"
    expected_answer_contains_any:
      - "86%"
    expected_page: 5
    expected_source: "asml-2024.pdf"
    category: operational_datapoint
    difficulty: easy
    notes: "86%."

  - id: asml_2024_eps
    question: "What was ASML's earnings per share in 2024?"
    expected_answer_contains_any:
      - "19.25"
      - "€19.25"
    expected_page: 55
    expected_source: "asml-2024.pdf"
    category: verbatim_financial
    difficulty: medium
    notes: "EPS €19.25."

  # ---------- Sustainability / ESG ----------
  - id: asml_2024_scope12_emissions
    question: "What were ASML's combined gross scope 1 and 2 GHG emissions in 2024?"
    expected_answer_contains_any:
      - "32.8 kt"
      - "32.8"
    expected_page: 200
    expected_source: "asml-2024.pdf"
    category: esg_datapoint
    difficulty: medium
    notes: "32.8 kt scope 1+2. Question clarified to 'combined'; page fixed 194→200."

  - id: asml_2024_scope3_emissions
    question: "What were ASML's total scope 3 CO2e emissions in 2024?"
    expected_answer_contains_any:
      - "12.0 Mt"
      - "12.0 million"
      - "12.0"
    expected_page: 194
    expected_source: "asml-2024.pdf"
    category: esg_datapoint
    difficulty: medium
    notes: "12.0 Mt total scope 3. Question clarified to 'total'."

  - id: asml_2024_reuse_rate
    question: "What was ASML's reuse rate of parts returned from field and factory in 2024?"
    expected_answer_contains_any:
      - "88%"
    expected_page: 240
    expected_source: "asml-2024.pdf"
    category: esg_datapoint
    difficulty: medium
    notes: "88% reuse rate (parts/circular economy metric)."

  # ---------- Workforce / diversity ----------
  - id: asml_2024_women_workforce
    question: "What percentage of ASML's workforce were women in 2024?"
    expected_answer_contains_any:
      - "21%"
    expected_page: 6
    expected_source: "asml-2024.pdf"
    category: pre_extracted_fact
    difficulty: easy
    notes: "21%."

  - id: asml_2024_nationalities
    question: "How many nationalities are represented in ASML's workforce in 2024?"
    expected_answer_contains_any:
      - "148"
    expected_page: 6
    expected_source: "asml-2024.pdf"
    category: pre_extracted_fact
    difficulty: easy
    notes: "148 nationalities."

  - id: asml_2024_eu_sales
    question: "What were ASML's net sales in EMEA in 2024?"
    expected_answer_contains_any:
      - "1.3"
      - "€1.3bn"
    expected_page: 56
    expected_source: "asml-2024.pdf"
    category: verbatim_financial
    difficulty: medium
    notes: "€1.3bn EMEA."

  # ---------- Hallucination / refusal ----------
  - id: refusal_2024_future_actual
    question: "What were ASML's actual reported net sales in 2027?"
    expected_behavior: refuse
    category: hallucination_check
    difficulty: easy
    notes: "Future actual — system should refuse."

  - id: refusal_2024_out_of_corpus
    question: "What was Intel's revenue in 2024?"
    expected_behavior: refuse
    category: hallucination_check
    difficulty: easy
    notes: "Intel not in corpus — hallucination check."

  - id: refusal_2024_unsupported_metric
    question: "How many patents did ASML file in 2024?"
    expected_behavior: refuse
    category: hallucination_check
    difficulty: medium
    notes: "Not in highlights or financial KPIs — system should refuse."
