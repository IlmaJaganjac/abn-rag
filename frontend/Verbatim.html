<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Annualyzer — ABN AMRO RAG</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400&family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
<style>/* Global styles + design tokens. Original "Dutch banking editorial" palette. */

:root {
  --bg: oklch(98% 0.005 90);
  --bg-2: oklch(96% 0.008 90);
  --paper: oklch(99.5% 0.003 90);
  --ink: oklch(18% 0.02 155);
  --ink-2: oklch(38% 0.02 155);
  --ink-3: oklch(58% 0.015 155);
  --line: oklch(90% 0.012 155);
  --line-2: oklch(85% 0.015 155);
  --primary: oklch(35% 0.06 155);
  --primary-hover: oklch(30% 0.07 155);
  --primary-ink: oklch(98% 0.01 155);
  --primary-tint: oklch(94% 0.025 155);
  --accent: oklch(85% 0.15 95);
  --accent-ink: oklch(28% 0.05 95);
  --danger: oklch(50% 0.16 30);
  --radius: 6px;
  --radius-lg: 10px;
  --shadow-sm: 0 1px 0 oklch(0% 0 0 / 0.04), 0 1px 2px oklch(0% 0 0 / 0.04);
  --shadow: 0 1px 0 oklch(0% 0 0 / 0.05), 0 8px 24px -8px oklch(0% 0 0 / 0.08);
}

* { box-sizing: border-box; }
html, body, #root { margin: 0; padding: 0; height: 100%; overflow: hidden; }
body {
  font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont, sans-serif;
  font-feature-settings: 'cv11', 'ss01', 'ss03';
  color: var(--ink);
  background: var(--bg);
  font-size: 14px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.editorial { font-family: 'Newsreader', Georgia, serif; font-feature-settings: 'lnum'; }
.mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
button { font-family: inherit; font-size: inherit; cursor: pointer; border: 0; background: none; color: inherit; }
input, textarea { font-family: inherit; font-size: inherit; color: inherit; }
::selection { background: var(--accent); color: var(--accent-ink); }

::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 8px; border: 2px solid var(--bg); }
::-webkit-scrollbar-thumb:hover { background: var(--ink-3); }

/* App shell */
.app { display: grid; grid-template-columns: 248px 1fr; height: 100%; min-height: 0; }
.sidebar {
  background: var(--paper);
  border-right: 1px solid var(--line);
  display: flex; flex-direction: column;
  padding: 18px 14px;
  gap: 18px;
  min-height: 0;
  overflow: hidden;
}
.brand { display: flex; align-items: center; gap: 10px; padding: 4px 8px; }
.brand-mark {
  width: 28px; height: 32px; flex-shrink: 0;
  display: grid; place-items: center;
  border-radius: 4px; overflow: hidden;
}
.brand-mark img { display: block; width: 100%; height: 100%; object-fit: cover; }
.brand-mark svg { display: block; width: 100%; height: 100%; }
.brand-name { font-weight: 600; letter-spacing: -0.01em; font-size: 15px; display: flex; align-items: center; gap: 6px; }
.brand-tag {
  font-size: 9px; font-weight: 600; letter-spacing: 0.06em;
  color: #009286; background: oklch(96% 0.04 175);
  padding: 1px 5px; border-radius: 3px;
  text-transform: uppercase;
}
.brand-sub { font-size: 11px; color: var(--ink-3); margin-top: -2px; }

.nav { display: flex; flex-direction: column; gap: 2px; }
.nav-section { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); padding: 8px 8px 4px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 6px;
  color: var(--ink-2); text-align: left;
  transition: background 120ms ease;
  width: 100%;
}
.nav-item:hover { background: var(--bg-2); color: var(--ink); }
.nav-item.active { background: var(--primary-tint); color: var(--primary); font-weight: 500; }
.nav-item .badge {
  margin-left: auto; font-size: 11px; color: var(--ink-3);
  background: var(--bg-2); padding: 1px 7px; border-radius: 10px;
}
.nav-item.active .badge { background: var(--paper); color: var(--primary); }

.sidebar-spacer { flex: 1; min-height: 16px; }

/* Pull-quote card — "from the index" */
.pull-card {
  position: relative;
  margin-top: 16px;
  padding: 14px 14px 12px;
  background: linear-gradient(180deg, var(--primary-tint) 0%, var(--paper) 100%);
  border: 1px solid var(--line);
  border-radius: 10px;
  cursor: pointer;
  transition: border-color 160ms ease, transform 160ms ease;
  overflow: hidden;
}
.pull-card::before {
  content: '';
  position: absolute; inset: 0;
  border-left: 2px solid var(--primary);
  border-top-left-radius: 10px;
  border-bottom-left-radius: 10px;
  pointer-events: none;
}
.pull-card:hover { border-color: var(--primary); }
.pull-card:active { transform: scale(0.995); }
.pull-eyebrow {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 8px;
}
.pull-kicker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px; font-weight: 500;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--primary);
}
.pull-topic {
  font-size: 10px;
  color: var(--ink-3);
  background: var(--paper);
  border: 1px solid var(--line);
  padding: 1px 6px; border-radius: 10px;
  letter-spacing: 0.02em;
}
.pull-quote {
  font-family: 'Newsreader', serif;
  font-size: 14px;
  font-style: italic;
  font-weight: 400;
  line-height: 1.4;
  letter-spacing: -0.005em;
  color: var(--ink);
  text-wrap: pretty;
  position: relative;
  margin-bottom: 10px;
}
.pull-mark {
  font-family: 'Newsreader', serif;
  font-size: 28px;
  font-style: normal;
  line-height: 0;
  color: var(--primary);
  margin-right: 2px;
  vertical-align: -0.2em;
  opacity: 0.55;
}
.pull-meta {
  display: flex; align-items: center; justify-content: space-between;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-3);
  letter-spacing: 0.02em;
  padding-top: 8px;
  border-top: 1px dashed var(--line);
}
.pull-source { color: var(--ink-2); font-weight: 500; }
.pull-page { opacity: 0.8; }
.pull-shuffle {
  position: absolute; top: 10px; right: 10px;
  width: 22px; height: 22px;
  display: none;
  place-items: center;
  border-radius: 6px;
  color: var(--ink-3);
  background: transparent;
}
.pull-card:hover .pull-shuffle { display: grid; }
.pull-shuffle:hover { background: var(--paper); color: var(--primary); }

/* Help button in topbar */
.help-btn {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 12px;
  color: var(--ink-2);
}
.help-btn:hover { color: var(--primary); border-color: var(--primary); }
.help-btn svg { opacity: 0.7; }
.help-btn:hover svg { opacity: 1; }

/* Guided tour */
.tour-root {
  position: fixed; inset: 0; z-index: 100;
  pointer-events: auto;
  opacity: 1;
}
@keyframes tour-fade {
  from { opacity: 0; }
  to { opacity: 1; }
}
.tour-mask {
  position: fixed; inset: 0;
  pointer-events: auto;
}
.tour-ring {
  filter: drop-shadow(0 0 0 4px var(--primary-tint));
  animation: tour-pulse 1800ms ease-in-out infinite;
}
@keyframes tour-pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.55; }
}
.tour-card {
  position: fixed;
  background: var(--paper);
  border: 1px solid var(--line);
  border-radius: 12px;
  padding: 18px 18px 14px;
  box-shadow: 0 24px 48px -16px rgba(15, 23, 30, 0.32), 0 4px 12px rgba(15, 23, 30, 0.08);
  z-index: 101;
  opacity: 1;
}
@keyframes tour-card-in {
  from { opacity: 0; transform: translateY(4px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
/* center-placement: no override needed; opacity already 1 */
@keyframes tour-card-center-in {
  from { opacity: 0; transform: translate(-50%, -48%) scale(0.97); }
  to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}
.tour-step {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--primary);
  margin-bottom: 8px;
}
.tour-title {
  font-family: 'Newsreader', serif;
  font-size: 22px;
  font-weight: 500;
  letter-spacing: -0.015em;
  color: var(--ink);
  line-height: 1.2;
  margin-bottom: 8px;
}
.tour-body {
  font-size: 13.5px;
  line-height: 1.5;
  color: var(--ink-2);
  text-wrap: pretty;
  margin-bottom: 16px;
}
.tour-actions {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 12px;
}
.tour-skip {
  font-size: 12px;
  color: var(--ink-3);
  text-decoration: underline;
  text-underline-offset: 3px;
  text-decoration-color: var(--line-2);
}
.tour-skip:hover { color: var(--ink-2); text-decoration-color: var(--ink-3); }
.tour-back, .tour-next { font-size: 12px; padding: 6px 12px; }
.tour-progress {
  display: flex; gap: 5px; justify-content: center;
}
.tour-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--line-2);
  transition: background 200ms ease, width 200ms ease;
}
.tour-dot.done { background: var(--primary); opacity: 0.4; }
.tour-dot.on { background: var(--primary); width: 16px; border-radius: 3px; }
.sidebar-foot {
  border-top: 1px solid var(--line);
  padding-top: 12px;
  font-size: 11px; color: var(--ink-3);
  display: flex; flex-direction: column; gap: 2px;
}
.sidebar-foot .dot {
  display: inline-block; width: 6px; height: 6px; border-radius: 50%;
  background: oklch(60% 0.12 155); margin-right: 6px;
}

/* Main */
.main { display: flex; flex-direction: column; min-width: 0; min-height: 0; height: 100%; }
.topbar {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 28px;
  border-bottom: 1px solid var(--line);
  background: var(--paper);
}
.topbar h1 { font-size: 16px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
.topbar .crumb { color: var(--ink-3); font-size: 13px; }
.topbar-spacer { flex: 1; }

.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 7px 12px; border-radius: 6px;
  background: var(--paper); color: var(--ink-2);
  border: 1px solid var(--line);
  transition: all 120ms ease;
  font-size: 13px;
}
.btn:hover { border-color: var(--ink-3); color: var(--ink); }
.btn-primary {
  background: var(--primary); color: var(--primary-ink); border-color: var(--primary);
}
.btn-primary:hover { background: var(--primary-hover); border-color: var(--primary-hover); }

.view { flex: 1; overflow-y: auto; min-height: 0; }

/* ----- Chat ----- */
.chat-wrap { max-width: 820px; margin: 0 auto; padding: 32px 28px 180px; }
.chat-empty { text-align: left; padding: 40px 0; }
.chat-empty h2 { font-family: 'Newsreader', serif; font-weight: 500; font-size: 32px; line-height: 1.15; letter-spacing: -0.015em; margin: 0 0 8px; }
.chat-empty p { color: var(--ink-3); margin: 0 0 28px; max-width: 560px; }
.suggested { display: flex; flex-direction: column; gap: 10px; }
.suggested-head { display: flex; align-items: center; justify-content: space-between; }
.suggested-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); }
.suggested-pager { display: flex; align-items: center; gap: 4px; }
.pager-btn {
  width: 24px; height: 24px; border-radius: 4px;
  border: 1px solid var(--line); background: var(--paper);
  color: var(--ink-2); font-size: 12px; line-height: 1;
  display: grid; place-items: center;
  transition: all 120ms ease;
}
.pager-btn:hover { border-color: var(--ink-3); color: var(--ink); background: var(--bg-2); }
.pager-count { font-size: 11px; color: var(--ink-3); font-variant-numeric: tabular-nums; padding: 0 6px; }
.suggested-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.suggested-btn {
  text-align: left; padding: 14px 16px;
  background: var(--paper); border: 1px solid var(--line); border-radius: 8px;
  font-size: 13px; color: var(--ink-2);
  transition: all 120ms ease;
}
.suggested-btn:hover { border-color: var(--ink-3); color: var(--ink); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
.suggested-btn-empty { background: transparent; border-color: transparent; pointer-events: none; box-shadow: none; }
.suggested-btn-empty:hover { transform: none; box-shadow: none; }
.suggested-btn .arrow { float: right; opacity: 0.4; }

.msg { margin-bottom: 28px; }
.msg-user {
  background: var(--primary-tint);
  border-left: 2px solid var(--primary);
  padding: 14px 18px;
  border-radius: 0 8px 8px 0;
  color: var(--ink);
}
.msg-meta { font-size: 11px; color: var(--ink-3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }

.msg-assistant { padding: 4px 0; }
.msg-assistant .answer-text {
  font-family: 'Newsreader', serif; font-size: 19px; line-height: 1.55;
  letter-spacing: -0.005em;
  color: var(--ink);
}
.verbatim-block {
  margin-top: 16px;
  background: var(--paper); border: 1px solid var(--line); border-radius: 8px;
  padding: 16px 18px;
  position: relative;
}
.verbatim-block::before {
  content: ''; position: absolute; left: 0; top: 14px; bottom: 14px; width: 2px;
  background: var(--accent);
}
.verbatim-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-3); margin-bottom: 6px; }
.verbatim-text { font-family: 'Newsreader', serif; font-style: italic; font-size: 16px; line-height: 1.5; color: var(--ink); }

.citations { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
.citations-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); }
.cite-card {
  display: flex; gap: 12px;
  background: var(--paper); border: 1px solid var(--line); border-radius: 6px;
  padding: 10px 12px;
  font-size: 13px;
  cursor: pointer;
  transition: all 120ms ease;
}
.cite-card:hover { border-color: var(--ink-3); background: var(--bg-2); }
.cite-num { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--primary); flex-shrink: 0; padding-top: 1px; min-width: 18px; }
.cite-body { min-width: 0; flex: 1; }
.cite-source { font-weight: 500; color: var(--ink); margin-bottom: 2px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
.cite-page-tag { font-family: 'JetBrains Mono', monospace; font-size: 11px; background: var(--bg-2); color: var(--ink-2); padding: 1px 6px; border-radius: 3px; }
.cite-quote { color: var(--ink-2); font-size: 13px; line-height: 1.45; }
.cite-action { color: var(--ink-3); padding-top: 2px; flex-shrink: 0; }

.caveat {
  margin-top: 12px;
  display: flex; gap: 10px;
  background: oklch(95% 0.05 95); border: 1px solid oklch(85% 0.08 95);
  border-radius: 6px; padding: 10px 12px; font-size: 13px; color: var(--accent-ink);
}
.refusal {
  border-left: 2px solid var(--ink-3);
  padding: 12px 16px; background: var(--bg-2); border-radius: 0 6px 6px 0;
  color: var(--ink-2);
}
.refusal-tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--ink-3); margin-bottom: 4px; }

/* Thinking indicator */
.thinking {
  background: var(--paper); border: 1px solid var(--line); border-radius: 8px;
  padding: 14px 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.thinking-row { display: flex; align-items: center; gap: 10px; font-size: 13px; }
.thinking-row .pulse {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--ink-3);
  flex-shrink: 0;
}
.thinking-row.active .pulse { background: var(--primary); animation: pulse 1.2s ease-in-out infinite; }
.thinking-row.done .pulse { background: oklch(60% 0.12 155); }
.thinking-row.done { color: var(--ink-3); }
.thinking-row.pending { color: var(--ink-3); opacity: 0.6; }
.thinking-row .detail { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-3); margin-left: auto; }
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.5); opacity: 0.5; }
}

.thinking-bars {
  display: flex; gap: 3px; align-items: end; height: 14px;
}
.thinking-bars span {
  display: block; width: 3px; background: var(--primary); border-radius: 2px;
  animation: bar 1s ease-in-out infinite;
}
.thinking-bars span:nth-child(1) { height: 60%; animation-delay: 0s; }
.thinking-bars span:nth-child(2) { height: 100%; animation-delay: 0.15s; }
.thinking-bars span:nth-child(3) { height: 40%; animation-delay: 0.3s; }
.thinking-bars span:nth-child(4) { height: 80%; animation-delay: 0.45s; }
@keyframes bar {
  0%, 100% { transform: scaleY(1); }
  50% { transform: scaleY(0.4); }
}

/* Composer */
.composer-dock {
  position: sticky; bottom: 0;
  margin-top: auto;
  padding: 16px 28px 24px;
  background: linear-gradient(to bottom, transparent, var(--bg) 30%);
  pointer-events: none;
}
.composer-dock-inner { max-width: 820px; margin: 0 auto; pointer-events: auto; }
.composer {
  background: var(--paper); border: 1px solid var(--line-2); border-radius: 12px;
  box-shadow: var(--shadow);
  padding: 12px 14px;
  display: flex; flex-direction: column; gap: 8px;
  transition: border-color 160ms ease;
}
.composer:focus-within { border-color: var(--primary); }
.composer textarea {
  width: 100%; resize: none; border: 0; outline: 0; background: transparent;
  font-size: 14px; line-height: 1.5;
  min-height: 24px; max-height: 200px;
  padding: 4px 2px;
}
.composer textarea::placeholder { color: var(--ink-3); }
.composer-row { display: flex; align-items: center; gap: 8px; }
.scope-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 16px;
  background: var(--bg-2); border: 1px solid var(--line);
  font-size: 12px; color: var(--ink-2);
}
.scope-pill select {
  border: 0; background: transparent; color: inherit; font-size: 12px;
  outline: 0; padding: 0; cursor: pointer;
}
.send-btn {
  margin-left: auto;
  width: 32px; height: 32px; border-radius: 8px;
  background: var(--primary); color: var(--primary-ink);
  display: grid; place-items: center;
  transition: background 120ms ease;
}
.send-btn:hover:not(:disabled) { background: var(--primary-hover); }
.send-btn:disabled { background: var(--line-2); color: var(--ink-3); cursor: not-allowed; }

/* ----- Documents ----- */
.docs-wrap { max-width: 1100px; margin: 0 auto; padding: 28px; }
.docs-hd { display: flex; align-items: end; gap: 16px; margin-bottom: 24px; }
.docs-hd h2 { font-family: 'Newsreader', serif; font-weight: 500; font-size: 28px; margin: 0; letter-spacing: -0.015em; }
.docs-hd .docs-count { color: var(--ink-3); font-size: 13px; }
.dropzone {
  border: 1.5px dashed var(--line-2); border-radius: 12px;
  padding: 24px; text-align: center;
  background: var(--paper);
  transition: all 160ms ease;
  margin-bottom: 24px;
}
.dropzone.over { border-color: var(--primary); background: var(--primary-tint); }
.dropzone .dz-title { font-family: 'Newsreader', serif; font-size: 18px; margin-bottom: 4px; }
.dropzone .dz-sub { font-size: 13px; color: var(--ink-3); margin-bottom: 12px; }

.docs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
.doc-card {
  background: var(--paper); border: 1px solid var(--line); border-radius: 10px;
  padding: 16px; display: flex; flex-direction: column; gap: 12px;
  transition: all 120ms ease;
  position: relative;
}
.doc-card:hover { border-color: var(--ink-3); box-shadow: var(--shadow-sm); }
.doc-card-hd { display: flex; gap: 12px; align-items: start; }
.doc-icon {
  width: 38px; height: 46px; flex-shrink: 0; border-radius: 4px;
  background: var(--primary-tint); color: var(--primary);
  display: grid; place-items: center;
  position: relative;
}
.doc-icon::after {
  content: ''; position: absolute; top: 0; right: 0; width: 10px; height: 10px;
  background: var(--paper);
  border-left: 1px solid var(--line); border-bottom: 1px solid var(--line);
}
.doc-title { font-weight: 500; font-size: 14px; line-height: 1.3; letter-spacing: -0.005em; }
.doc-meta { font-size: 11px; color: var(--ink-3); margin-top: 2px; font-family: 'JetBrains Mono', monospace; }
.doc-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding-top: 10px; border-top: 1px solid var(--line); }
.doc-stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); margin-bottom: 2px; }
.doc-stat-value { font-family: 'Newsreader', serif; font-size: 18px; font-weight: 500; color: var(--ink); letter-spacing: -0.01em; }
.doc-status { display: inline-flex; align-items: center; gap: 6px; font-size: 11px; }
.doc-status .dot { width: 6px; height: 6px; border-radius: 50%; }
.doc-status.ready .dot { background: oklch(60% 0.12 155); }
.doc-status.parsing .dot { background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }

/* Ingestion job (inline progress) */
.ingest-row {
  background: var(--paper); border: 1px solid var(--line); border-radius: 8px;
  padding: 12px 14px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 14px;
}
.ingest-row .name { font-weight: 500; font-size: 13px; }
.ingest-row .stages { display: flex; gap: 8px; font-size: 11px; color: var(--ink-3); }
.ingest-row .stages span.active { color: var(--primary); font-weight: 500; }
.progress-bar { flex: 1; height: 4px; background: var(--bg-2); border-radius: 2px; overflow: hidden; }
.progress-bar .fill { height: 100%; background: var(--primary); border-radius: 2px; transition: width 200ms ease; }

/* Upload toast */
.toast-stack {
  position: fixed; right: 24px; bottom: 24px; z-index: 60;
  display: flex; flex-direction: column; gap: 10px;
  pointer-events: none;
}
.toast {
  pointer-events: auto;
  display: flex; align-items: flex-start; gap: 12px;
  width: 380px; max-width: calc(100vw - 48px);
  padding: 14px 14px 14px 16px;
  background: var(--paper);
  border: 1px solid var(--line);
  border-left: 3px solid var(--primary);
  border-radius: 10px;
  box-shadow: 0 12px 28px -8px rgba(15, 23, 30, 0.18), 0 2px 6px rgba(15, 23, 30, 0.06);
  animation: toast-in 320ms cubic-bezier(0.2, 0.8, 0.2, 1);
}
@keyframes toast-in {
  from { opacity: 0; transform: translateY(8px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.toast-icon {
  flex-shrink: 0;
  width: 36px; height: 36px;
  border-radius: 8px;
  background: var(--primary-tint);
  color: var(--primary);
  display: grid; place-items: center;
}
.toast-body { flex: 1; min-width: 0; }
.toast-title {
  font-family: 'Newsreader', serif;
  font-weight: 500;
  font-size: 15px;
  letter-spacing: -0.01em;
  color: var(--ink);
  line-height: 1.3;
  margin-bottom: 3px;
}
.toast-text {
  font-size: 12.5px;
  line-height: 1.45;
  color: var(--ink-2);
}
.toast-close {
  flex-shrink: 0;
  width: 22px; height: 22px;
  border-radius: 4px;
  color: var(--ink-3);
  font-size: 18px; line-height: 1;
  display: grid; place-items: center;
  margin-top: -2px;
}
.toast-close:hover { background: var(--bg-2); color: var(--ink); }

/* ----- Datapoints ----- */
.dp-wrap { max-width: 1200px; margin: 0 auto; padding: 28px; }
.dp-hd { display: flex; gap: 12px; align-items: end; margin-bottom: 24px; }
.dp-hd h2 { font-family: 'Newsreader', serif; font-weight: 500; font-size: 28px; margin: 0; letter-spacing: -0.015em; }
.dp-filters { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-chip {
  padding: 5px 12px; border-radius: 16px; border: 1px solid var(--line); background: var(--paper);
  font-size: 12px; color: var(--ink-2);
  display: inline-flex; align-items: center; gap: 6px;
}
.filter-chip.active { background: var(--primary); color: var(--primary-ink); border-color: var(--primary); }

.dp-table {
  background: var(--paper); border: 1px solid var(--line); border-radius: 10px;
  overflow: hidden;
}
.dp-row {
  display: grid;
  grid-template-columns: 110px 1.6fr 0.9fr 90px 1fr;
  gap: 16px; padding: 14px 18px;
  border-bottom: 1px solid var(--line);
  align-items: start;
  font-size: 13px;
}
.dp-row:last-child { border-bottom: 0; }
.dp-row:not(.header):hover { background: var(--bg-2); }
.dp-row.header { background: var(--bg-2); font-size: 10px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); padding: 10px 18px; }
.dp-row .company { font-weight: 600; font-size: 12px; color: var(--ink); }
.dp-row .company .type-tag { display: block; font-size: 10px; font-weight: 400; color: var(--ink-3); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }
.dp-row .metric { color: var(--ink); }
.dp-row .metric .verbatim { color: var(--ink-3); font-size: 12px; line-height: 1.4; margin-top: 4px; font-style: italic; }
.dp-row .value { font-family: 'Newsreader', serif; font-size: 18px; font-weight: 500; color: var(--ink); letter-spacing: -0.01em; }
.dp-row .page-ref { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-3); }
.dp-row .source-ref { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--ink-3); word-break: break-all; }
</style>

/* ===== frontend/src/api/datapoints.ts =====
 * Live loader for datapoints. Calls `GET /api/datapoints` (the contract in
 * BACKEND_HANDOFF.md) and falls back to MOCK_DATAPOINTS when the API is offline
 * or returns an empty list.
 *
 * Backend writes records via `persist_datapoints()` in
 * backend/app/ingestion.py — each item is a `NormalizedDatapoint.model_dump()`,
 * so the field names match exactly: `datapoint_type`, `quote`, `section_path`,
 * `fact_kind`, `scope_type`, `unit`, `target_year`, `confidence`, `extractor`.
 *
 * If the API ever exposes the raw legacy shape (`type`, `verbatim`, `section`)
 * we normalize it on the way in so the UI stays in one shape.
 */
async function loadDatapoints(opts?: { company?: string; type?: string; signal?: AbortSignal }): Promise<Datapoint[]> {
  const params = new URLSearchParams();
  if (opts?.company && opts.company !== 'all') params.set('company', opts.company);
  if (opts?.type && opts.type !== 'all') params.set('type', opts.type);
  const qs = params.toString();
  const url = `/api/datapoints${qs ? `?${qs}` : ''}`;
  try {
    const res = await fetch(url, { signal: opts?.signal });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const raw: any[] = await res.json();
    if (!Array.isArray(raw) || raw.length === 0) throw new Error('empty');
    return raw.map(normalizeDatapoint);
  } catch {
    // Filter the mock list locally so the UI behaves the same offline.
    return MOCK_DATAPOINTS.filter(d => {
      if (opts?.company && opts.company !== 'all' && d.company !== opts.company) return false;
      if (opts?.type && opts.type !== 'all' && d.datapoint_type !== opts.type) return false;
      return true;
    });
  }
}

function normalizeDatapoint(raw: any): Datapoint {
  // Tolerate older `type`/`verbatim`/`section` shapes alongside the canonical
  // NormalizedDatapoint shape so nothing breaks if the backend lags.
  return {
    company: raw.company ?? null,
    source: raw.source,
    page: raw.page ?? null,
    datapoint_type: raw.datapoint_type ?? raw.type ?? 'other',
    metric: raw.metric ?? '',
    value: raw.value ?? null,
    unit: raw.unit ?? null,
    basis: raw.basis ?? null,
    period: raw.period ?? null,
    section_path: raw.section_path ?? raw.section ?? null,
    quote: raw.quote ?? raw.verbatim ?? '',
    fact_kind: raw.fact_kind ?? null,
    scope_type: raw.scope_type ?? null,
    scope: raw.scope ?? null,
    target_year: raw.target_year ?? null,
    confidence: raw.confidence ?? null,
    extractor: raw.extractor ?? null,
    year: raw.year ?? null,
  };
}

window.loadDatapoints = loadDatapoints;

/**
 * Slide-in PDF viewer. Uses pdf.js (loaded from CDN on first open) to render
 * the cited page on a canvas. When the real backend is connected, set the
 * `pdfUrl` prop to e.g. `/api/documents/${source}/pdf` so the file streams
 * from the server. Until then, it renders a stylized placeholder for the
 * cited page so the user can see the citation context.
 */


const PDFJS_CDN = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs';
const PDFJS_WORKER = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs';

let pdfjsPromise: Promise<any> | null = null;
function loadPdfjs(): Promise<any> {
  if ((window as any).pdfjsLib) return Promise.resolve((window as any).pdfjsLib);
  if (pdfjsPromise) return pdfjsPromise;
  pdfjsPromise = new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = () => {
      const lib = window.pdfjsLib;
      if (!lib) return reject(new Error('pdfjsLib missing'));
      lib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      resolve(lib);
    };
    s.onerror = () => reject(new Error('pdfjs load failed'));
    document.head.appendChild(s);
  });
  return pdfjsPromise;
}
function PdfViewer({ open, source, page, quote, onClose }: PdfViewerProps) {
  const canvasRef = useRef<HTMLCanvasElement>(null);
  const [status, setStatus] = useState<'idle' | 'loading' | 'rendered' | 'no-source' | 'error'>('idle');
  const [errMsg, setErrMsg] = useState<string>('');
  const [pageNum, setPageNum] = useState<number>(page ?? 1);
  const [totalPages, setTotalPages] = useState<number>(0);

  useEffect(() => { if (open && page) setPageNum(page); }, [open, page, source]);

  useEffect(() => {
    if (!open || !source) return;
    let cancelled = false;

    const url = `/api/documents/${encodeURIComponent(source)}/pdf`;

    (async () => {
      setStatus('loading');
      try {
        // Probe whether backend serves the file. In demo mode we expect a 404 → fallback.
        const probe = await fetch(url, { method: 'HEAD' }).catch(() => null);
        if (!probe || !probe.ok) {
          if (!cancelled) { setStatus('no-source'); }
          return;
        }
        const lib = await loadPdfjs();
        const doc = await lib.getDocument(url).promise;
        if (cancelled) return;
        setTotalPages(doc.numPages);
        const target = Math.min(Math.max(pageNum, 1), doc.numPages);
        const p = await doc.getPage(target);
        const canvas = canvasRef.current; if (!canvas) return;
        const ctx = canvas.getContext('2d')!;
        const viewport = p.getViewport({ scale: 1.4 });
        canvas.width = viewport.width;
        canvas.height = viewport.height;
        await p.render({ canvasContext: ctx, viewport }).promise;
        if (!cancelled) setStatus('rendered');
      } catch (e: any) {
        if (!cancelled) { setStatus('error'); setErrMsg(String(e?.message ?? e)); }
      }
    })();

    return () => { cancelled = true; };
  }, [open, source, pageNum]);

  // Keyboard nav
  useEffect(() => {
    if (!open) return;
    const onKey = (e: KeyboardEvent) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowLeft' && pageNum > 1) setPageNum(n => n - 1);
      if (e.key === 'ArrowRight' && (totalPages === 0 || pageNum < totalPages)) setPageNum(n => n + 1);
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, pageNum, totalPages, onClose]);

  if (!open) return null;

  return (
    <>
      <div
        onClick={onClose}
        style={{
          position: 'fixed', inset: 0, background: 'oklch(15% 0.01 155 / 0.4)',
          zIndex: 80, animation: 'fade-in 160ms ease',
        }}
      />
      <aside
        role="dialog"
        aria-label={`Source ${source} page ${pageNum}`}
        style={{
          position: 'fixed', top: 0, right: 0, bottom: 0, width: 'min(640px, 92vw)',
          background: 'var(--paper)', borderLeft: '1px solid var(--line)',
          boxShadow: '-12px 0 40px -12px oklch(0% 0 0 / 0.18)',
          zIndex: 81, display: 'flex', flexDirection: 'column',
          animation: 'slide-in 200ms cubic-bezier(0.2, 0.7, 0.2, 1)',
        }}
      >
        <header style={{
          display: 'flex', alignItems: 'center', gap: 12,
          padding: '14px 18px', borderBottom: '1px solid var(--line)',
        }}>
          <div style={{ minWidth: 0, flex: 1 }}>
            <div style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: 'var(--ink-3)' }}>
              SOURCE
            </div>
            <div style={{ fontWeight: 500, fontSize: 14, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
              {source ?? '—'}
            </div>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 12, color: 'var(--ink-2)' }}>
            <button className="btn" style={{ padding: '4px 8px' }} onClick={() => setPageNum(n => Math.max(1, n - 1))} aria-label="Previous page">‹</button>
            <span className="mono" style={{ minWidth: 56, textAlign: 'center' }}>
              p.{pageNum}{totalPages ? ` / ${totalPages}` : ''}
            </span>
            <button className="btn" style={{ padding: '4px 8px' }}
              onClick={() => setPageNum(n => totalPages ? Math.min(totalPages, n + 1) : n + 1)} aria-label="Next page">›</button>
          </div>
          <button className="btn" onClick={onClose} aria-label="Close" style={{ padding: '4px 10px' }}>✕</button>
        </header>

        {quote && (
          <div style={{
            padding: '12px 18px', borderBottom: '1px solid var(--line)',
            background: 'oklch(98% 0.025 95)',
            fontFamily: "'Newsreader', serif", fontStyle: 'italic',
            fontSize: 14, color: 'var(--ink)', lineHeight: 1.5,
            borderLeft: '2px solid var(--accent)',
          }}>
            &ldquo;{quote}&rdquo;
          </div>
        )}

        <div style={{
          flex: 1, overflow: 'auto', background: 'var(--bg-2)',
          padding: 24, display: 'flex', justifyContent: 'center', alignItems: 'flex-start',
        }}>
          {status === 'loading' && (
            <div style={{ color: 'var(--ink-3)', padding: 60, fontSize: 13 }}>Loading PDF…</div>
          )}
          {status === 'error' && (
            <div style={{ color: 'var(--danger)', padding: 60, fontSize: 13, textAlign: 'center' }}>
              Failed to render PDF<br /><span className="mono" style={{ fontSize: 11 }}>{errMsg}</span>
            </div>
          )}
          {status === 'no-source' && (
            <PlaceholderPage source={source} pageNum={pageNum} quote={quote} />
          )}
          <canvas
            ref={canvasRef}
            style={{
              display: status === 'rendered' ? 'block' : 'none',
              maxWidth: '100%', height: 'auto',
              background: 'white',
              boxShadow: '0 4px 24px -8px oklch(0% 0 0 / 0.18)',
              borderRadius: 4,
            }}
          />
        </div>

        <footer style={{
          padding: '10px 18px', borderTop: '1px solid var(--line)',
          fontSize: 11, color: 'var(--ink-3)',
          display: 'flex', alignItems: 'center', gap: 12,
        }}>
          <span>← / → page · Esc to close</span>
          <div style={{ flex: 1 }} />
          <a
            href={source ? `/api/documents/${encodeURIComponent(source)}/pdf#page=${pageNum}` : '#'}
            target="_blank" rel="noreferrer"
            style={{ color: 'var(--primary)', textDecoration: 'none', display: 'inline-flex', alignItems: 'center', gap: 4 }}
          >
            Open in tab <IExternal size={11} />
          </a>
        </footer>
      </aside>

      <style>{`
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slide-in { from { transform: translateX(20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
      `}</style>
    </>
  );
}

function PlaceholderPage({ source, pageNum, quote }: { source: string | null; pageNum: number; quote: string | null }) {
  // A stylized "page" so the citation context is shown even without a real PDF.
  return (
    <div style={{
      width: '100%', maxWidth: 520, aspectRatio: '8.5 / 11',
      background: 'white', boxShadow: '0 4px 24px -8px oklch(0% 0 0 / 0.18)', borderRadius: 4,
      padding: '52px 56px', position: 'relative', overflow: 'hidden',
      fontFamily: "'Newsreader', serif", color: 'oklch(20% 0.01 155)',
    }}>
      <div style={{
        fontSize: 9, textTransform: 'uppercase', letterSpacing: 0.12,
        color: 'oklch(55% 0.02 155)', display: 'flex', justifyContent: 'space-between',
      }}>
        <span>{source}</span>
        <span>Page {pageNum}</span>
      </div>
      <div style={{
        marginTop: 24,
        fontSize: 18, fontWeight: 500, letterSpacing: '-0.01em',
      }}>
        Note 18 — Employees
      </div>
      <div style={{ marginTop: 16, fontSize: 11, lineHeight: 1.7, color: 'oklch(35% 0.01 155)' }}>
        {Array.from({ length: 6 }).map((_, i) => (
          <div key={i} style={{
            height: 8, background: 'oklch(92% 0.005 155)', borderRadius: 2,
            marginBottom: 6, width: `${85 - i * 4}%`,
          }} />
        ))}
      </div>
      {quote && (
        <div style={{
          margin: '24px 0', padding: '12px 14px',
          background: 'oklch(97% 0.04 95)',
          borderLeft: '2px solid oklch(75% 0.16 95)',
          fontSize: 12, lineHeight: 1.5, fontStyle: 'italic',
        }}>
          &ldquo;{quote}&rdquo;
        </div>
      )}
      <div style={{ fontSize: 11, lineHeight: 1.7, color: 'oklch(35% 0.01 155)' }}>
        {Array.from({ length: 12 }).map((_, i) => (
          <div key={i} style={{
            height: 8, background: 'oklch(92% 0.005 155)', borderRadius: 2,
            marginBottom: 6, width: `${100 - (i % 4) * 8}%`,

      </div>
      <div style={{

        borderTop: '1px solid oklch(90% 0.005 155)', paddingTop: 8,
      }}>
        <span>{source}</span>
        <span>{pageNum}</span>
      </div>
      <div style={{
        position: 'absolute', top: 12, right: 12,
        fontSize: 9, color: 'oklch(60% 0.05 95)',
        background: 'oklch(96% 0.04 95)', padding: '2px 6px', borderRadius: 3,
      }}>preview · backend offline</div>
    </div>
  );
}

const PHASE_LABELS: Record<ThinkingPhase, string> = {
  queued: 'Queued',
  embedding: 'Embedding question',
  searching: 'Searching index',
  reading: 'Reading source pages',
  drafting: 'Drafting answer',
  citing: 'Verifying verbatim quotes',
  done: 'Complete',
};

const PHASE_ORDER: ThinkingPhase[] = ['embedding', 'searching', 'reading', 'drafting', 'citing'];

function pickMockAnswer(q: string): VerbatimAnswer & { caveat?: string } {
  const lower = q.toLowerCase();
  if (lower.includes('asml') && (lower.includes('employee') || lower.includes('fte'))) return SAMPLE_ANSWERS.asml_fte;
  if (lower.includes('shell') && (lower.includes('climate') || lower.includes('adapt'))) return SAMPLE_ANSWERS.shell_climate;
  if (lower.includes('abn') || lower.includes('workforce')) return SAMPLE_ANSWERS.abn_workforce;
  if (lower.includes('car') || lower.includes('vehicle')) return SAMPLE_ANSWERS.refusal;
  // default: a synthesized answer
  return {
    question: q,
    answer: 'I searched across 5 indexed reports but couldn\u2019t find a verbatim figure that directly answers this. The closest matches discuss adjacent topics. Try narrowing to a specific company or year, or rephrase using language likely to appear in the report.',
    verbatim: null,
    citations: [
      { source: 'asml.pdf', page: 178, quote: 'We aim to be greenhouse gas neutral across our value chain by 2040.' },
    ],
    refused: false, refusal_reason: null, raw_citations: [], grounding_drops: [],
  };
}

function ThinkingPanel({ phase, detail, retrievedCount }: { phase: ThinkingPhase; detail?: string; retrievedCount: number }) {
  const idx = PHASE_ORDER.indexOf(phase);
  return (
    <div className="thinking">
      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
        <div className="thinking-bars"><span /><span /><span /><span /></div>
        <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: 12, color: 'var(--ink-2)' }}>
          thinking · {PHASE_LABELS[phase].toLowerCase()}{detail ? ` · ${detail}` : ''}
        </span>
      </div>
      {PHASE_ORDER.map((p, i) => {
        const state = i < idx ? 'done' : i === idx ? 'active' : 'pending';
        const detailText =
          p === 'embedding' && state !== 'pending' ? 'text-embedding-3-small · 1536d' :
          p === 'searching' && state !== 'pending' ? `${retrievedCount} chunks · k=8` :
          p === 'reading' && state !== 'pending' ? `${Math.min(retrievedCount, 8)} pages` :
          p === 'drafting' && state !== 'pending' ? 'gpt-4o-mini' :
          p === 'citing' && state !== 'pending' ? 'verbatim match' : '';
        return (
          <div key={p} className={`thinking-row ${state}`}>
            <span className="pulse" />
            <span>{PHASE_LABELS[p]}</span>
            {detailText && <span className="detail">{detailText}</span>}
          </div>
        );
      })}
    </div>
  );
}

function AnswerBlock({ ans, caveat, onCite }: { ans: VerbatimAnswer; caveat?: string; onCite: (c: Citation) => void }) {
  if (ans.refused) {
    return (
      <div className="msg-assistant">
        <div className="refusal">
          <div className="refusal-tag">Cannot answer from indexed documents</div>
          <div>{ans.refusal_reason}</div>
        </div>
      </div>
    );
  }
  return (
    <div className="msg-assistant">
      <div className="answer-text">{ans.answer}</div>
      {ans.verbatim && (
        <div className="verbatim-block">
          <div className="verbatim-label">Verbatim from source</div>
          <div className="verbatim-text">&ldquo;{ans.verbatim}&rdquo;</div>
        </div>
      )}
      {caveat && (
        <div className="caveat">
          <span style={{ flexShrink: 0, marginTop: 1 }}>⚠</span>
          <span>{caveat}</span>
        </div>
      )}
      {ans.citations.length > 0 && (
        <div className="citations">
          <div className="citations-label">Sources · {ans.citations.length}</div>
          {ans.citations.map((c, i) => (
            <div key={i} className="cite-card" onClick={() => onCite(c)} role="button" tabIndex={0}
              onKeyDown={e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); onCite(c); } }}>
              <div className="cite-num">[{i + 1}]</div>
              <div className="cite-body">
                <div className="cite-source">
                  <span>{c.source}</span>
                  <span className="cite-page-tag">p.{c.page}</span>
                </div>
                <div className="cite-quote">&ldquo;{c.quote}&rdquo;</div>
              </div>
              <div className="cite-action"><IExternal /></div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function SuggestedQuestions({ questions, onPick }: { questions: string[]; onPick: (q: string) => void }) {
  const PAGE_SIZE = 4;
  const totalPages = Math.max(1, Math.ceil(questions.length / PAGE_SIZE));
  const [page, setPage] = useState(0);
  const start = page * PAGE_SIZE;
  const slice = questions.slice(start, start + PAGE_SIZE);
  // Pad to keep grid height stable across pages
  const pad = PAGE_SIZE - slice.length;

  const next = () => setPage(p => (p + 1) % totalPages);
  const prev = () => setPage(p => (p - 1 + totalPages) % totalPages);

  return (
    <div className="suggested">
      <div className="suggested-head">
        <span className="suggested-label">Try one of these</span>
        {totalPages > 1 && (
          <div className="suggested-pager">
            <button className="pager-btn" onClick={prev} aria-label="Previous suggestions">←</button>
            <span className="pager-count">{page + 1} / {totalPages}</span>
            <button className="pager-btn" onClick={next} aria-label="Next suggestions">→</button>
          </div>
        )}
      </div>
      <div className="suggested-grid">
        {slice.map(q => (
          <button key={q} className="suggested-btn" onClick={() => onPick(q)}>
            {q}<span className="arrow">→</span>
          </button>
        ))}
        {Array.from({ length: pad }).map((_, i) => (
          <div key={`pad-${i}`} className="suggested-btn suggested-btn-empty" aria-hidden="true" />
        ))}
      </div>
    </div>
  );
}
function ChatView() {
  const [messages, setMessages] = useState<ChatMessage[]>([]);
  const [input, setInput] = useState('');
  const [scope, setScope] = useState<string>('all');
  const [busy, setBusy] = useState(false);
  const [phase, setPhase] = useState<ThinkingPhase>('queued');
  const [phaseDetail, setPhaseDetail] = useState<string>('');
  const [viewer, setViewer] = useState<{ source: string; page: number; quote: string } | null>(null);
  const taRef = useRef<HTMLTextAreaElement>(null);
  const endRef = useRef<HTMLDivElement>(null);

  const companies = useMemo(() => {
    const s = new Set(MOCK_DOCS.map(d => d.company).filter((c): c is string => !!c));
    return Array.from(s).sort();
  }, []);

  useEffect(() => { endRef.current?.scrollIntoView({ block: 'end' }); }, [messages, busy, phase]);

  const send = async (q: string) => {
    if (!q.trim() || busy) return;
    const userMsg: ChatMessage = { id: `u-${Date.now()}`, role: 'user', content: q, ts: Date.now() };
    setMessages(m => [...m, userMsg]);
    setInput('');
    setBusy(true);

    // Simulated phase progression. Real call would use api.ask() with onPhase.
    const phaseTimings: [ThinkingPhase, string, number][] = [
      ['embedding', '', 350],
      ['searching', 'k=8 · cosine', 600],
      ['reading', '', 700],
      ['drafting', '', 1100],
      ['citing', '', 500],
    ];
    for (const [p, d, ms] of phaseTimings) {
      setPhase(p); setPhaseDetail(d);
      await new Promise(r => setTimeout(r, ms));
    }

    const ans = pickMockAnswer(q);
    const aMsg: ChatMessage = {
      id: `a-${Date.now()}`,
      role: 'assistant',
      content: ans.answer,
      answer: ans,
      caveat: (ans as VerbatimAnswer & { caveat?: string }).caveat,
      ts: Date.now(),
    };
    setMessages(m => [...m, aMsg]);
    setBusy(false); setPhase('queued');
  };

  const onKey = (e: React.KeyboardEvent) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send(input);
    }
  };

  // autosize
  useEffect(() => {
    const ta = taRef.current; if (!ta) return;
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 200) + 'px';
  }, [input]);

  const lastAssistantQuestion = messages.findLast?.(m => m.role === 'user')?.content;

  return (
    <>
      <div className="view">
        <div className="chat-wrap">
          {messages.length === 0 ? (
            <div className="chat-empty">
              <h2>Ask anything from indexed reports.</h2>
              <p>Every answer is grounded in a verbatim quote with page-level citations. Off-topic questions and hallucinations are refused.</p>
              <SuggestedQuestions questions={SUGGESTED_QUESTIONS} onPick={send} />
            </div>
          ) : (
            messages.map(m => (
              <div key={m.id} className="msg">
                {m.role === 'user' ? (
                  <div className="msg-user">
                    <div className="msg-meta">You asked</div>
                    {m.content}
                  </div>
                ) : (
                  m.answer && <AnswerBlock ans={m.answer} caveat={m.caveat} onCite={c => setViewer({ source: c.source, page: c.page, quote: c.quote })} />
                )}
              </div>
            ))
          )}

          {busy && (
            <div className="msg">
              <ThinkingPanel phase={phase} detail={phaseDetail} retrievedCount={12} />
            </div>
          )}

          <div ref={endRef} />
        </div>
      </div>

      <div className="composer-dock">
        <div className="composer-dock-inner">
          <div className="composer">
            <textarea
              ref={taRef}
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={onKey}
              placeholder={lastAssistantQuestion ? 'Ask a follow-up…' : 'Ask about ASML, Shell, ABN AMRO, Heineken…'}
              rows={1}
            />
            <div className="composer-row">
              <span className="scope-pill">
                <span style={{ color: 'var(--ink-3)' }}>Scope</span>
                <select value={scope} onChange={e => setScope(e.target.value)}>
                  <option value="all">All documents</option>
                  {companies.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </span>
              <span style={{ fontSize: 11, color: 'var(--ink-3)' }}>
                {busy ? '· streaming' : 'Enter to send · Shift+Enter newline'}
              </span>
              <button
                className="send-btn"
                disabled={!input.trim() || busy}
                onClick={() => send(input)}
                aria-label="Send"
              ><ISend /></button>
            </div>
          </div>
        </div>
      </div>
      <PdfViewer
        open={!!viewer}
        source={viewer?.source ?? null}
        page={viewer?.page ?? null}
        quote={viewer?.quote ?? null}
        onClose={() => setViewer(null)}
      />
    </>
  );
}

function DocumentsView() {
  const [docs] = useState<Document[]>(MOCK_DOCS);
  const [over, setOver] = useState(false);
  const [ingest, setIngest] = useState<Ingest[]>([]);
  const [toasts, setToasts] = useState<Toast[]>([]);

  const showToast = () => {
    const id = `t-${Date.now()}`;
    setToasts(arr => [...arr, { id }]);
    setTimeout(() => setToasts(arr => arr.filter(t => t.id !== id)), 7000);
  };
  const dismissToast = (id: string) => setToasts(arr => arr.filter(t => t.id !== id));

  const simulate = (name: string) => {
    showToast();
    const id = `ing-${Date.now()}-${Math.random().toString(36).slice(2, 6)}`;
    setIngest(arr => [...arr, { id, name, stage: 'parsing', pct: 6 }]);
    let pct = 6;
    const tick = setInterval(() => {
      pct += 4 + Math.random() * 8;

const PAD = 8;
const GAP = 14;
const CARD_W = 340;
function Tour({ steps, onClose, onViewChange }: Props) {
  const [i, setI] = useState(0);
  const [rect, setRect] = useState<DOMRect | null>(null);
  const [, setTick] = useState(0);
  const cardRef = useRef<HTMLDivElement>(null);
  const lastMeasuredKey = useRef<string>('');

  const step = steps[i];

  // Switch view if step needs it
  useEffect(() => {
    if (step?.view) onViewChange(step.view);
  }, [i]);

  // Measure target rect — retries briefly because view changes might not be
  // painted yet on the very first frame.
  useEffect(() => {
    if (!step) return;
    let cancelled = false;
    let tries = 0;
    const measure = () => {
      if (cancelled) return;
      if (step.placement === 'center' || !step.selector) {
        setRect(null);
        return;
      }
      const el = document.querySelector(step.selector) as HTMLElement | null;
      if (el) {
        const r = el.getBoundingClientRect();
        setRect(r);
        // Make sure it's visible
        if (r.top < 0 || r.bottom > window.innerHeight) {
          el.scrollIntoView({ block: 'center', behavior: 'smooth' });
          // re-measure after scroll settles
          setTimeout(() => {
            if (!cancelled) setRect(el.getBoundingClientRect());
          }, 320);
        }
      } else if (tries++ < 20) {
        setTimeout(measure, 60);
      } else {
        setRect(null);
      }
    };
    measure();

    const onResize = () => {
      const el = step.selector ? (document.querySelector(step.selector) as HTMLElement | null) : null;
      if (el) setRect(el.getBoundingClientRect());
    };
    window.addEventListener('resize', onResize);
    window.addEventListener('scroll', onResize, true);
    return () => {
      cancelled = true;
      window.removeEventListener('resize', onResize);
      window.removeEventListener('scroll', onResize, true);
    };
  }, [i, step]);

  // After paint, force one re-render so cardRef.current?.offsetHeight is used
  // for clamping. Guard with a key so we don't loop.
  useEffect(() => {
    const key = `${i}:${rect?.x ?? 'x'}:${rect?.y ?? 'y'}:${rect?.width ?? 'w'}:${rect?.height ?? 'h'}`;
    if (cardRef.current && lastMeasuredKey.current !== key) {
      lastMeasuredKey.current = key;
      setTick(t => t + 1);
    }
  });

  // ESC closes
  useEffect(() => {
    const onKey = (e: KeyboardEvent) => {
      if (e.key === 'Escape') onClose();
      if (e.key === 'ArrowRight' || e.key === 'Enter') next();
      if (e.key === 'ArrowLeft') prev();
    };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [i]);

  const next = () => {
    if (i < steps.length - 1) setI(i + 1);
    else onClose();
  };
  const prev = () => { if (i > 0) setI(i - 1); };

  // Compute spotlight + card position
  const spot = rect
    ? { x: rect.left - PAD, y: rect.top - PAD, w: rect.width + PAD * 2, h: rect.height + PAD * 2 }
    : null;

  let cardStyle: React.CSSProperties = {};
  if (!spot || step.placement === 'center') {
    cardStyle = {
      left: '50%', top: '50%',
      transform: 'translate(-50%, -50%)',
      width: CARD_W,
    };
  } else {
    const place = step.placement || 'right';
    const vw = window.innerWidth, vh = window.innerHeight;
    // Use the card's measured height when available, so right/left placements
    // don't get clipped at the top when their target sits near the viewport edge.
    const cardH = (cardRef.current?.offsetHeight ?? 220);
    let left = 0, top = 0;
    if (place === 'right') {
      left = spot.x + spot.w + GAP;
      top = spot.y + spot.h / 2 - cardH / 2;
    } else if (place === 'left') {
      left = spot.x - GAP - CARD_W;
      top = spot.y + spot.h / 2 - cardH / 2;
    } else if (place === 'bottom') {
      left = spot.x + spot.w / 2 - CARD_W / 2;
      top = spot.y + spot.h + GAP;
    } else {
      left = spot.x + spot.w / 2 - CARD_W / 2;
      top = spot.y - GAP - cardH;
    }
    // clamp to viewport
    left = Math.max(16, Math.min(left, vw - CARD_W - 16));
    top = Math.max(16, Math.min(top, vh - cardH - 16));
    cardStyle = { left, top, width: CARD_W };
  }

  if (!step) return null;

  return (
    <div className="tour-root" role="dialog" aria-modal="true" aria-label="Product tour">
      {/* SVG mask for spotlight */}
      <svg className="tour-mask" width="100%" height="100%">
        <defs>
          <mask id="tour-cut">
            <rect width="100%" height="100%" fill="white" />
            {spot && (
              <rect x={spot.x} y={spot.y} width={spot.w} height={spot.h} rx={10} ry={10} fill="black" />
            )}
          </mask>
        </defs>
        <rect width="100%" height="100%" fill="rgba(15, 23, 30, 0.55)" mask="url(#tour-cut)" />
        {spot && (
          <rect
            x={spot.x} y={spot.y} width={spot.w} height={spot.h}
            rx={10} ry={10} fill="none"
            stroke="var(--primary)" strokeWidth={2}
            className="tour-ring"
          />
        )}
      </svg>

      <div className="tour-card" style={cardStyle} ref={cardRef}>
        <div className="tour-step">Step {i + 1} of {steps.length}</div>
        <div className="tour-title">{step.title}</div>
        <div className="tour-body">{step.body}</div>
        <div className="tour-actions">
          <button className="tour-skip" onClick={onClose}>Skip tour</button>
          <div style={{ flex: 1 }} />
          {i > 0 && <button className="btn tour-back" onClick={prev}>Back</button>}
          <button className="btn btn-primary tour-next" onClick={next}>
            {i === steps.length - 1 ? 'Got it' : 'Next'}
          </button>
        </div>
        <div className="tour-progress" aria-hidden="true">
          {steps.map((_, k) => (
            <span key={k} className={`tour-dot ${k === i ? 'on' : ''} ${k < i ? 'done' : ''}`} />
          ))}
        </div>
      </div>
    </div>
  );
}

        setTimeout(() => setTourOpen(true), 400);
      }
    } catch {}
  }, []);

  const closeTour = () => {
    setTourOpen(false);
    try { localStorage.setItem(TOUR_KEY, '1'); } catch {}
  };
  const openTour = () => setTourOpen(true);

  // Tweaks protocol
  useEffect(() => {
    const onMsg = (e: MessageEvent) => {
      if (e.data?.type === '__activate_edit_mode') setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  useEffect(() => {
    ensureFontLink(tweaks.fontPair);
    // tiny delay so fonts apply before we re-target
    const id = setTimeout(() => applyTweaks(tweaks), 50);
    applyTweaks(tweaks);
    return () => clearTimeout(id);
  }, [tweaks, view]);

  const setTweak = <K extends keyof Tweaks>(k: K, v: Tweaks[K]) => {
    setTweaks(prev => {
      const next = { ...prev, [k]: v };
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
      return next;
    });
  };

  const titles: Record<ViewKey, { h: string; sub: string }> = {
    chat: { h: 'Ask', sub: 'Verbatim Q&A grounded in indexed PDFs' },
    docs: { h: 'Documents', sub: 'Annual reports indexed for retrieval' },
    datapoints: { h: 'Datapoints', sub: 'Pre-extracted facts for fast answers' },
  };

  return (
    <div className="app">
      <Sidebar
        view={view}
        onChange={setView}
        docCount={docCount}
        datapointCount={datapointCount}
      />
      <main className="main">
        <header className="topbar">
          <div>
            <h1>{titles[view].h}</h1>
            <div className="crumb">{titles[view].sub}</div>
          </div>
          <div className="topbar-spacer" />
          <button className="btn help-btn" onClick={openTour} aria-label="Help / take a tour" title="Take the tour">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="10" />
              <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3" />
              <line x1="12" y1="17" x2="12.01" y2="17" />
            </svg>
            Help
          </button>
          {view === 'chat' && (
            <button className="btn">New thread</button>
          )}
        </header>

        {view === 'chat' && <ChatView />}
        {view === 'docs' && <DocumentsView />}
        {view === 'datapoints' && <DatapointsView />}
      </main>

      {tourOpen && (
        <Tour steps={TOUR_STEPS} onClose={closeTour} onViewChange={setView} />
      )}

      {tweaksOpen && (
        <div style={{
          position: 'fixed', right: 20, bottom: 20, width: 280,
          background: 'var(--paper)', border: '1px solid var(--line-2)', borderRadius: 12,
          boxShadow: '0 12px 40px -12px oklch(0% 0 0 / 0.18)',
          padding: 16, zIndex: 50,
        }}>
          <div style={{ display: 'flex', alignItems: 'center', marginBottom: 12 }}>
            <div style={{ fontWeight: 600, fontSize: 13 }}>Tweaks</div>
            <button
              style={{ marginLeft: 'auto', color: 'var(--ink-3)', fontSize: 18, lineHeight: 1 }}
              onClick={() => {
                setTweaksOpen(false);
                window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
              }}
            >×</button>
          </div>

          <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
            <div>
              <label style={{ fontSize: 11, color: 'var(--ink-3)', textTransform: 'uppercase', letterSpacing: 0.6 }}>
                Primary hue · {tweaks.primaryHue}°
              </label>
              <input type="range" min={0} max={360} value={tweaks.primaryHue}
                onChange={e => setTweak('primaryHue', Number(e.target.value))}
                style={{ width: '100%' }}
              />
            </div>
            <div>
              <label style={{ fontSize: 11, color: 'var(--ink-3)', textTransform: 'uppercase', letterSpacing: 0.6 }}>
                Saturation · {tweaks.primaryChroma.toFixed(2)}
              </label>
              <input type="range" min={0} max={0.18} step={0.01} value={tweaks.primaryChroma}
                onChange={e => setTweak('primaryChroma', Number(e.target.value))}
                style={{ width: '100%' }}
              />
            </div>
            <div>
              <label style={{ fontSize: 11, color: 'var(--ink-3)', textTransform: 'uppercase', letterSpacing: 0.6, display: 'block', marginBottom: 4 }}>
                Font pair
              </label>
              <select value={tweaks.fontPair} onChange={e => setTweak('fontPair', e.target.value as Tweaks['fontPair'])}
                style={{ width: '100%', padding: '6px 8px', border: '1px solid var(--line)', borderRadius: 6, background: 'var(--bg-2)' }}>
                <option value="newsreader-inter">Newsreader · Inter Tight</option>
                <option value="fraunces-geist">Fraunces · Geist</option>
                <option value="instrument-ibm">Instrument Serif · IBM Plex</option>
              </select>
            </div>
            <div>
              <label style={{ fontSize: 11, color: 'var(--ink-3)', textTransform: 'uppercase', letterSpacing: 0.6, display: 'block', marginBottom: 4 }}>
                Density
              </label>
              <div style={{ display: 'flex', gap: 4 }}>
                {(['compact','comfortable','spacious'] as const).map(d => (
                  <button key={d}
                    className={`btn ${tweaks.density === d ? 'btn-primary' : ''}`}
                    style={{ flex: 1, padding: '5px 6px', fontSize: 11, textTransform: 'capitalize' }}
                    onClick={() => setTweak('density', d)}
                  >{d}</button>
                ))}
              </div>
            </div>
            <label style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13 }}>
              <input type="checkbox" checked={tweaks.showVerbatim}
                onChange={e => setTweak('showVerbatim', e.target.checked)} />
              Show verbatim quote block
            </label>
          </div>
        </div>
      )}
    </div>
  );
}

window.App = App;
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));</script>
